server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/authdb
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: replace-this-with-a-long-random-secret-string-at-least-32-chars
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000